<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="top">
                <div class="login-logo"><img src="images/images (1).jfif" alt=""></div>
                <div class="web-name">
                    <h3>DOLLAR MINE</h3>
                    <p>Sign into your account</p>
                </div>
            </div>

            <div class="notice">
                <p>Use your <span>username or email to sign in</span></p>
            </div>
        </div>

        <div class="credentials">
            <label for="">Username or Email</label>
            <input class="email-input" type="text" name="" id="" placeholder="username or yourname@email.com">
            <div class="password">
               <label>Password</label>
                <label class="forgot">Forgot password?</label>
            </div> 
            <div class="show-password">
                <input type="password"  id="" placeholder="••••••••">
               <div class="eye" ><img src="images/close-eye.jfif" alt=""></div> 
            </div>
            <div class="checkbox">
             <input type="checkbox"><p>Remember me</p>
            </div>
        </div>
        
        <div class="bottom">
            <button class="login-btn"><p>Sign In</p></button>
            <p class="line2">OR CONTINUE WITH</p>
          
            <div class="media">
                <button><img src="images/x.jfif" alt=""></button>
                <button><img src="images/fb.jfif" alt=""></button>
                <button><img src="images/whatsp.jfif" alt=""></button>
            </div>
            <p class="root">Don't have an account?<span>Sign Up</span> </p>
        </div>

    </div>
</body>
</html>
